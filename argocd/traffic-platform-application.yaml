apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traffic-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ovoshchko/DevOps
    targetRevision: main
    path: charts/traffic-platform
  destination:
    server: https://kubernetes.default.svc
    namespace: devops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
