apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traffic-platform
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: backend=ghcr.io/ovoshchko/traffic-backend,frontend=ghcr.io/ovoshchko/traffic-frontend,ml=ghcr.io/ovoshchko/traffic-ml-service
    argocd-image-updater.argoproj.io/pull-secret: pullsecret:argocd/ghcr-secret
    argocd-image-updater.argoproj.io/write-back-method: argocd
    argocd-image-updater.argoproj.io/backend.update-strategy: newest-build
    argocd-image-updater.argoproj.io/backend.allow-tags: regexp:^sha-[0-9a-f]{40}$
    argocd-image-updater.argoproj.io/backend.helm.image-name: backend.image.repository
    argocd-image-updater.argoproj.io/backend.helm.image-tag: backend.image.tag
    argocd-image-updater.argoproj.io/frontend.update-strategy: newest-build
    argocd-image-updater.argoproj.io/frontend.allow-tags: regexp:^sha-[0-9a-f]{40}$
    argocd-image-updater.argoproj.io/frontend.helm.image-name: frontend.image.repository
    argocd-image-updater.argoproj.io/frontend.helm.image-tag: frontend.image.tag
    argocd-image-updater.argoproj.io/ml.update-strategy: newest-build
    argocd-image-updater.argoproj.io/ml.allow-tags: regexp:^sha-[0-9a-f]{40}$
    argocd-image-updater.argoproj.io/ml.helm.image-name: mlService.image.repository
    argocd-image-updater.argoproj.io/ml.helm.image-tag: mlService.image.tag
spec:
  project: default
  source:
    repoURL: https://github.com/Ovoshchko/DevOps
    targetRevision: main
    path: charts/traffic-platform
  destination:
    server: https://kubernetes.default.svc
    namespace: devops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
