apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ include "traffic-platform.namespace" . }}
  labels:
    {{- include "traffic-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "traffic-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "traffic-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: INFLUX_URL
              value: {{ .Values.backend.env.influxUrl | quote }}
            - name: INFLUX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.influxdb.auth.existingSecret }}
                  key: {{ .Values.influxdb.auth.keys.adminToken }}
            - name: INFLUX_ORG
              value: {{ .Values.backend.env.influxOrg | quote }}
            - name: INFLUX_BUCKET
              value: {{ .Values.backend.env.influxBucket | quote }}
            - name: ML_SERVICE_URL
              value: {{ .Values.backend.env.mlServiceUrl | quote }}
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.auth.existingSecret }}
                  key: {{ .Values.postgres.auth.keys.dsn }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
