apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: {{ include "traffic-platform.namespace" . }}
  labels:
    {{- include "traffic-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ml-service
spec:
  selector:
    {{- include "traffic-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ml-service
  ports:
    - name: http
      port: 80
      targetPort: http
  type: {{ .Values.mlService.service.type }}
