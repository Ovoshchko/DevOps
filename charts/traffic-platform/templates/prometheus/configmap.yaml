apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ include "traffic-platform.namespace" . }}
  labels:
    {{- include "traffic-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: 'backend-pods'
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['{{ include "traffic-platform.namespace" . }}']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: keep
            regex: backend
          - source_labels: [__meta_kubernetes_pod_ready]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "8000"
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container

      - job_name: 'ml-service-pods'
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['{{ include "traffic-platform.namespace" . }}']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: keep
            regex: ml-service
          - source_labels: [__meta_kubernetes_pod_ready]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "8001"
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
