apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: {{ include "traffic-platform.namespace" . }}
  labels:
    {{- include "traffic-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: influxdb
spec:
  selector:
    {{- include "traffic-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: influxdb
  ports:
    - name: http
      port: {{ .Values.influxdb.service.port }}
      targetPort: http
  type: {{ .Values.influxdb.service.type }}
