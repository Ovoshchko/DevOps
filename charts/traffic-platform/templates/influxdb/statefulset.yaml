apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: influxdb
  namespace: {{ include "traffic-platform.namespace" . }}
  labels:
    {{- include "traffic-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: influxdb
spec:
  serviceName: influxdb
  replicas: {{ .Values.influxdb.replicaCount }}
  selector:
    matchLabels:
      {{- include "traffic-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: influxdb
  template:
    metadata:
      labels:
        {{- include "traffic-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: influxdb
    spec:
      containers:
        - name: influxdb
          image: "{{ .Values.influxdb.image.repository }}:{{ .Values.influxdb.image.tag }}"
          imagePullPolicy: {{ .Values.influxdb.image.pullPolicy }}
          ports:
            - containerPort: 8086
              name: http
          envFrom:
            - configMapRef:
                name: influxdb-config
            - secretRef:
                name: {{ .Values.influxdb.auth.existingSecret }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/influxdb2
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.influxdb.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.influxdb.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.influxdb.persistence.size }}
