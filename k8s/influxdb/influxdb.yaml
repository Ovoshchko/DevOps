apiVersion: v1
kind: ConfigMap
metadata:
  name: influxdb-config
  namespace: devops
data:
  DOCKER_INFLUXDB_INIT_MODE: setup
  DOCKER_INFLUXDB_INIT_ORG: devops
  DOCKER_INFLUXDB_INIT_BUCKET: traffic
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: influxdb
  namespace: devops
  labels:
    app: influxdb
spec:
  serviceName: influxdb
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
        - name: influxdb
          image: influxdb:2.7
          ports:
            - containerPort: 8086
              name: http
          envFrom:
            - configMapRef:
                name: influxdb-config
            - secretRef:
                name: influxdb-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/influxdb2
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: devops
spec:
  selector:
    app: influxdb
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
