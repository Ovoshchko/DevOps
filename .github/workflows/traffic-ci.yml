name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install './backend[dev]'
      - run: PYTHONPATH=. python -m pytest backend/tests

  ml-test:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install './ml-service[dev]'
      - run: PYTHONPATH=ml-service python -m pytest ml-service/tests

  frontend-test:
    runs-on: ubuntu-latest
    needs: ml-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm test -- --watchAll=false
        working-directory: frontend

  sonarqube-scan:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install backend and ml-service dependencies
        run: |
          pip install pytest pytest-cov
          pip install './backend[dev]'
          pip install './ml-service[dev]'

      - name: Run backend tests with coverage
        run: |
          PYTHONPATH=. python -m pytest backend/tests \
            --cov=backend/app \
            --cov-report=xml:backend/coverage.xml

      - name: Run ml-service tests with coverage
        run: |
          cd ml-service
          PYTHONPATH=. python -m pytest tests \
            --cov=app \
            --cov-report=xml:coverage.xml

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run frontend tests with coverage
        run: |
          cd frontend
          npm ci
          npm test -- --coverage --watchAll=false

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=devops-traffic-platform
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
            -Dsonar.sources=backend/app,ml-service/app,frontend/src
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml,ml-service/coverage.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.qualitygate.wait=true

  backend-build:
    runs-on: ubuntu-latest
    needs: sonarqube-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install './backend[dev]'
      - run: python -m pip wheel --no-deps --wheel-dir /tmp/wheels ./backend

  ml-build:
    runs-on: ubuntu-latest
    needs: backend-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install './ml-service[dev]'
      - run: python -m pip wheel --no-deps --wheel-dir /tmp/wheels ./ml-service

  frontend-build:
    runs-on: ubuntu-latest
    needs: ml-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  backend-docker:
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ env.OWNER }}/traffic-backend:latest

  ml-docker:
    runs-on: ubuntu-latest
    needs: backend-docker
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/build-push-action@v6
        with:
          context: ./ml-service
          file: ./ml-service/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ env.OWNER }}/traffic-ml-service:latest

  frontend-docker:
    runs-on: ubuntu-latest
    needs: ml-docker
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ env.OWNER }}/traffic-frontend:latest
