name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install './backend[dev]'
      - name: Run backend tests with coverage
        run: |
          mkdir -p backend/test-results
          PYTHONPATH=. python -m pytest backend/tests \
            --junitxml=backend/test-results/pytest.xml \
            --cov=backend/app \
            --cov-report=xml:backend/coverage.xml \
            --cov-fail-under=80
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/test-results/pytest.xml

  ml-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install './ml-service[dev]'
      - name: Run ml-service tests with coverage
        run: |
          cd ml-service
          mkdir -p test-results
          PYTHONPATH=. python -m pytest tests \
            --junitxml=test-results/pytest.xml \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: ml-service-coverage
          path: |
            ml-service/coverage.xml
            ml-service/test-results/pytest.xml

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - name: Run frontend tests with coverage
        run: |
          mkdir -p test-results
          npm test -- --coverage --watchAll=false --json --outputFile=test-results/jest-results.json --coverageThreshold='{"global":{"statements":80,"branches":80,"functions":80,"lines":80}}'
        working-directory: frontend
      - name: Convert frontend test report for SonarCloud
        if: ${{ always() }}
        run: node scripts/jest-to-sonar.js test-results/jest-results.json test-results/sonar-test-execution.xml
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: frontend-coverage
          path: |
            frontend/coverage/lcov.info
            frontend/test-results/sonar-test-execution.xml

  sonarqube-scan:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [backend-test, ml-test, frontend-test]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend

      - uses: actions/download-artifact@v4
        with:
          name: ml-service-coverage
          path: ml-service

      - uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  backend-build:
    runs-on: ubuntu-latest
    needs: sonarqube-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install './backend[dev]'
      - run: python -m pip wheel --no-deps --wheel-dir /tmp/wheels ./backend

  ml-build:
    runs-on: ubuntu-latest
    needs: backend-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install './ml-service[dev]'
      - run: python -m pip wheel --no-deps --wheel-dir /tmp/wheels ./ml-service

  frontend-build:
    runs-on: ubuntu-latest
    needs: ml-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  backend-docker:
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ env.OWNER }}/traffic-backend:latest

  ml-docker:
    runs-on: ubuntu-latest
    needs: backend-docker
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/build-push-action@v6
        with:
          context: ./ml-service
          file: ./ml-service/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ env.OWNER }}/traffic-ml-service:latest

  frontend-docker:
    runs-on: ubuntu-latest
    needs: ml-docker
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ env.OWNER }}/traffic-frontend:latest
