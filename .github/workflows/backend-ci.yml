name: Backend CI

on:
  push:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install './backend[dev]'
      - name: Run tests
        run: PYTHONPATH=. python -m pytest backend/tests

  build-backend:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install './backend[dev]'
      - name: Build package
        run: python -m pip wheel --no-deps --wheel-dir /tmp/wheels ./backend
